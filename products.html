  .page-tabs {

  .campaign-container {

    font-weight: 700;

<script src="js/app.js"></script>

<script src="js/settings.js"></script>

<script>
// Tab Fonksiyonları
function switchProductTab(tabName) {
  // Tüm sekmeler gizle
  const sections = document.querySelectorAll(".tab-section");
  sections.forEach(el => el.classList.remove("active"));

  // Tüm butonları pasif yap
  const buttons = document.querySelectorAll(".tab-btn");
  buttons.forEach(el => el.classList.remove("active"));

  // Seçili sekmeyi göster
  document.getElementById(tabName).classList.add("active");
  
  // Seçili butonu aktif yap
  event.target.closest(".tab-btn").classList.add("active");
}

window.switchProductTab = switchProductTab;

function scrollToTab(tabName) {
  const button = document.querySelector(`[onclick="switchProductTab('${tabName}')"]`);
  if (button) {
    button.click();
    button.scrollIntoView({ behavior: 'smooth' });
  }
}

window.scrollToTab = scrollToTab;

// Ayarları yükle
function loadSiteSettings() {
  const defaultSettings = {
    siteName: "Uğur Böceği",
    location: "Bolu",
    phone: "0534 088 82 49",
    whatsapp: "905340888249",
    heroTitle: "Pratik Ev Aletlerinde Yeni Nesil Alışveriş",
    heroSubtitle: "Kaliteli ürünler • Uygun fiyat • Güvenli alışveriş",
    campaignText: "Seçili ürünlerde %30'a varan indirim.",
    copyright: "© 2026 Uğur Böceği Pratik Ev Aletleri",
    campaignTitle: "Haftanın Kampanyası",
    campaignDescription: "Seçili ürünlerde %30'a varan indirim.",
    discountPercent: 30,
    campaignActive: 1
  };

  const saved = localStorage.getItem("siteSettings");
  return saved ? JSON.parse(saved) : defaultSettings;
}

// Para Formatı
function formatPrice(price) {
  return Number(price).toLocaleString("tr-TR") + " ₺";
}

// Ürünleri yükle
function loadProductsPage() {
  const products = JSON.parse(localStorage.getItem("products")) || [];
  const grid = document.getElementById("productGrid");
  
  grid.innerHTML = "";

  if (products.length === 0) {
    // Varsayılan ürünleri göster
    const defaultProducts = [
      { id: 1, name: "Philips Airfryer XXL", price: 7199, category: "Airfryer", image: "images/airfryer1.png", discount: 20 },
      { id: 2, name: "Arzum Blender Seti", price: 2549, category: "Blender", image: "images/blender1.png", discount: 15 },
      { id: 3, name: "Dikey Şarjlı Süpürge", price: 8299, category: "Süpürge", image: "images/vacuum1.png", discount: 25 },
      { id: 4, name: "Karaca Tost Makinesi", price: 3149, category: "Tost Makinesi", image: "images/toast1.png", discount: 10 }
    ];
    
    defaultProducts.forEach(product => {
      const card = createProductCard(product);
      grid.innerHTML += card;
    });
  } else {
    products.forEach(product => {
      const card = createProductCard(product);
      grid.innerHTML += card;
    });
  }

  // Sepete ekle butonlarını bağla
  attachAddToCartListeners();
}

function createProductCard(product) {
  const discount = product.discount || 15;
  const originalPrice = Math.round(product.price * 100 / (100 - discount));
  
  return `
    <div class="product-card">
      <span class="discount">%${discount}</span>
      <button class="favorite">
        <i class="fa-regular fa-heart"></i>
      </button>
      <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/250?text=Görsel+Bulunamadı'">
      <h3>${product.name}</h3>
      <p class="stock in-stock">
        ✔ Stokta Var
      </p>
      <div class="price">
        <del>${formatPrice(originalPrice)}</del>
        <strong>${formatPrice(product.price)}</strong>
      </div>
      <div class="stars">
        ★★★★★
      </div>
      <div class="buttons">
        <button class="detail-btn">İncele</button>
        <button class="btn add-cart"
          data-id="${product.id}"
          data-name="${product.name}"
          data-price="${product.price}">
          Sepete Ekle
        </button>
      </div>
    </div>
  `;
}

function attachAddToCartListeners() {
  document.querySelectorAll('.add-cart').forEach(btn => {
    btn.onclick = function() {
      const id = parseInt(this.dataset.id);
      const name = this.dataset.name;
      const price = parseInt(this.dataset.price);
      
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const index = cart.findIndex(x => x.id == id);
      
      if(index === -1) {
        cart.push({
          id: id,
          name: name,
          price: price,
          image: this.parentElement.parentElement.querySelector('img').src,
          quantity: 1
        });
      } else {
        cart[index].quantity++;
      }
      
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartCount();
      showToast("Ürün sepete eklendi.");
    }
  });
}

// Kampanya sayfasını yükle
function loadCampaignPage() {
  const settings = loadSiteSettings();
  const campaignContent = document.getElementById("campaignContent");
  
  if (settings.campaignActive == 1) {
    campaignContent.innerHTML = `
      <h2>${settings.campaignTitle}</h2>
      <p>${settings.campaignDescription}</p>
      <div class="discount-badge">%${settings.discountPercent} İNDİRİM</div>
    `;
  } else {
    campaignContent.innerHTML = `
      <h2>Kampanya Şu Anda Aktif Değil</h2>
      <p>Yeni kampanyalar için lütfen bizi takip edin.</p>
    `;
  }

  // Kampanya ürünlerini göster
  const products = JSON.parse(localStorage.getItem("products")) || [];
  const campaignGrid = document.getElementById("campaignProductGrid");
  
  if (products.length === 0) {
    campaignGrid.innerHTML = `
      <div style="grid-column: 1 / -1; text-align: center; color: #999; padding: 40px;">
        <p>Kampanya ürünü bulunamadı.</p>
      </div>
    `;
  } else {
    campaignGrid.innerHTML = "";
    products.forEach(product => {
      const card = createProductCard(product);
      campaignGrid.innerHTML += card;
    });
    attachAddToCartListeners();
  }
}

// Cart count güncelle
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
  const countElements = document.querySelectorAll("#cartCount, [data-cart-count]");
  countElements.forEach(el => {
    el.textContent = cartCount;
  });
}

// Toast mesajı
function showToast(message) {
  const toast = document.createElement('div');
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    background: #4caf50;
    color: white;
    padding: 15px 20px;
    border-radius: 5px;
    z-index: 1000;
    animation: slideIn 0.3s;
  `;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'slideOut 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// Sayfa yüklendiğinde
document.addEventListener('DOMContentLoaded', function() {
  loadProductsPage();
  loadCampaignPage();
  updateCartCount();
  
  // Arama ve filtreleme
  const searchInput = document.getElementById('search');
  if (searchInput) {
    searchInput.addEventListener('keyup', function() {
      // Arama fonksiyonu - ileride eklenebilir
      console.log('Search:', this.value);
    });
  }
});
</script>
